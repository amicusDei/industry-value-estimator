# AI Revenue Attribution Registry
# Hand-curated per-company AI revenue estimates for mixed-tech public companies.
#
# Purpose: Provides attribution inputs for Plan 10-02 revenue_attribution.py.
#          Each entry captures one company's AI revenue estimate with full provenance.
#
# Schema per entry (all fields required):
#   company_name: str            — Company display name
#   cik: str                     — SEC EDGAR CIK (must match BUNDLED_SEGMENT_COMPANIES)
#   value_chain_layer: str       — One of: chip, cloud, application, end_market
#   ai_revenue_usd_billions: float — AI-attributable revenue estimate in USD billions
#   attribution_method: str      — One of: direct_disclosure, management_commentary, analogue_ratio
#   ratio_source: str            — Source citation for the estimate
#   vintage_date: str            — ISO date of the source (YYYY-MM-DD or YYYY-MM)
#   uncertainty_low: float       — Lower bound of estimate range (USD billions)
#   uncertainty_high: float      — Upper bound of estimate range (USD billions)
#   segment: str                 — One of: ai_hardware, ai_infrastructure, ai_software, ai_adoption
#   value_chain_layer: str       — One of: chip, cloud, application, end_market
#   year: int                    — Fiscal year the estimate refers to (2017-2026)
#   estimated_flag: bool         — false if directly disclosed, true if inferred
#
# Pitfall guard: Every ratio must have ratio_source, vintage_date, uncertainty_low,
# uncertainty_high. DO NOT store bare float percentages without provenance.
#
# Sub-segment splits for multi-layer companies are in config/industries/ai.yaml
# under attribution_subsegment_ratios. This registry stores company-level totals.
#
# DO NOT MODIFY without updating vintage_date per entry.

