# AI Market Analyst Estimate Registry
# Hand-curated corpus of published market size estimates for the AI industry.
#
# Purpose: Provides the raw input for ground truth reconciliation in Plan 08-04.
#          Each entry captures a single published estimate with full provenance metadata.
#
# Schema per entry (all fields required, no nulls):
#   source_firm: str            — Analyst or research firm name
#   report_name: str            — Full report title
#   publication_year: int       — Year the report was published
#   estimate_year: int          — Year the estimate refers to (may be historical or forecast)
#   segment: str                — One of: total, ai_hardware, ai_infrastructure, ai_software, ai_adoption
#   as_published_usd_billions: float — Raw published figure in USD billions (nominal)
#   currency: str               — Always "nominal_usd" in this corpus
#   scope_includes: str         — What this firm includes in their definition
#   scope_excludes: str         — What this firm explicitly excludes
#   methodology_notes: str      — How the estimate was produced
#   source_url: str             — URL to the report or press release (best effort)
#   confidence: str             — high / medium / low (based on source quality and recency)
#
# Vintage series: Multiple entries for the same estimate_year from different publication_years
# document how analyst revisions evolved over time. This is critical for reconciliation.
#
# Scope normalization coefficients are in config/industries/ai.yaml scope_mapping_table.
# Apply: scope_normalized = as_published_usd_billions * scope_coefficient[source_firm]
#
# DO NOT MODIFY after Plan 08-04 ground truth reconciliation is complete.
# To add new entries, append below and re-run the reconciliation pipeline.

entries:

