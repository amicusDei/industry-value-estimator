    vintage_date: "2025-07"

# ============================================================
# MODEL CALIBRATION PARAMETERS
# All hardcoded constants used in the ensemble pipeline, dashboard,
# and forecast engine are centralized here.
# ============================================================
model_calibration:
  # CAGR calibration floors per segment (analyst consensus lower bounds)
  # These are the baseline (conservative) floors. Scenario multipliers scale them.
  cagr_floors:
    ai_hardware: 0.15    # Statista/Gartner AI semiconductor CAGR
    ai_infrastructure: 0.25  # IDC/GVR AI data center CAGR 24-32%
    ai_software: 0.20    # Precedence Research AI software CAGR
    ai_adoption: 0.15    # GVR/Mordor Intelligence enterprise AI CAGR

  # Scenario definitions for Bull/Base/Bear analysis (v2-AP2)
  # Each scenario multiplies the base cagr_floors above.
  # conservative = current analyst consensus floors (1.0x)
  # base = moderate upside reflecting GenAI acceleration (1.3x)
  # aggressive = bull case assuming broad AI adoption wave (1.8x)
  scenarios:
    conservative:
      multiplier: 1.0
      description: "Analyst consensus lower bounds — current CAGR floors unchanged"
    base:
      multiplier: 1.3
      description: "Moderate upside — GenAI acceleration lifts growth 30% above consensus floors"
    aggressive:
      multiplier: 1.8
      description: "Bull case — broad enterprise AI adoption wave drives 80% above consensus floors"

  # Model vs consensus blend ratio when model CAGR < floor
  calibration_blend:
    model_weight: 0.50   # Was 0.30 — increased to preserve more model signal
    consensus_weight: 0.50  # Was 0.70

  # CI width floors (fraction of point estimate)
  ci_width_floors:
    ci80_fraction: 0.25   # 80% CI half-width minimum as fraction of point
    ci95_fraction: 0.40   # 95% CI half-width minimum as fraction of point

  # Forecast floor (prevents negative/near-zero forecasts)
  forecast_floor:
    last_value_fraction: 0.50  # Floor at 50% of last real value
    absolute_minimum_usd_billions: 1.5  # Or $1.5B, whichever is higher

  # MAPE interpretive thresholds
  mape_thresholds:
    acceptable: 15        # <15% MAPE
    use_with_caution: 30  # 15-30% MAPE
    # >30% = directional_only

  # Inflation assumption for nominal USD conversion
  inflation:
    method: "world_bank_deflator"  # Uses World Bank GDP deflator; falls back to CAGR if unavailable
    annual_cagr: 0.025       # Fallback only if deflator unavailable — 2.5% constant

# Source metadata (for DATA-07 attribution downstream)
source_attribution:
  world_bank: "World Bank Open Data (data.worldbank.org)"
  oecd: "OECD.Stat (stats.oecd.org)"
  lseg: "LSEG Workspace (Refinitiv)"

# ============================================================
# MARKET BOUNDARY DEFINITION (locked in Plan 08-01)
# DO NOT MODIFY after initial commit — changing this invalidates
# all downstream reconciliation decisions.
# ============================================================
market_boundary:
  definition_locked: "2026-03-23"
  scope_statement: >
    AI software platforms, AI infrastructure (cloud compute dedicated to AI workloads,
    AI-specific hardware including GPUs, TPUs, and AI accelerators), and AI services/consulting.
    Excludes: general IT infrastructure not dedicated to AI workloads, AI-enabled consumer
    products where AI is embedded (e.g., smartphone cameras), general enterprise software
    with AI features added post-hoc, and semiconductor foundry revenue not specific to AI chips.
  closest_analyst_match: "IDC Worldwide AI Spending Guide (enterprise narrow scope)"
  rationale: >
    IDC's enterprise-narrow definition is chosen as the closest match because it excludes
    general IT infrastructure overlap and is the definition most commonly cited in financial
    analysis contexts. Gartner's broad $1.5T+ estimate includes all AI-adjacent technology
    spending; Grand View's narrow estimate focuses on AI software only. Our scope includes
    hardware + infrastructure + software + adoption, making it slightly broader than IDC
    (which excludes dedicated AI hardware) but much narrower than Gartner. Each analyst
    firm's scope coefficient in scope_mapping_table documents the adjustment needed to
    normalize their published figure to our definition.
  overlap_zones:
    - zone: "hardware_to_infrastructure"
      description: >
        GPU revenue counted in ai_hardware and again as cloud infrastructure CapEx.
        Documented range: 20-30% of ai_infrastructure is hardware passthrough.
    - zone: "software_to_adoption"
      description: >
        Enterprise AI SaaS licenses counted in ai_software and again as enterprise
        deployment spend. Documented range: 15-25% of ai_adoption is software licensing.
    - zone: "infrastructure_to_software"
      description: >
        Cloud AI platform revenue (e.g., AWS SageMaker, Azure ML) spans both
        infrastructure and software categories. Documented range: 10-15% overlap.
  adjusted_total_method: >
    Adjusted total = sum(segments) - midpoint(overlap_ranges). Overlap ranges are
    documented per zone above. The unadjusted sum and adjusted total are both reported
    so analysts can see the difference.

# ============================================================
# SCOPE MAPPING TABLE — analyst firm scope normalization
# Each entry maps one analyst firm's published estimate to our
# scope definition via a scope_coefficient multiplier.
# scope_coefficient = (our scope / their scope) approximation
# ============================================================
scope_mapping_table:
  - firm: "IDC"
    report_series: "Worldwide AI Spending Guide"
    scope_alignment: "close"
    scope_coefficient: 1.0
    scope_coefficient_range: [0.95, 1.05]
    includes: "Enterprise AI software, IT infrastructure dedicated to AI, and AI services/consulting"
    excludes: "Consumer AI applications, general IT infrastructure not AI-specific, AI hardware (chips)"
    segment_coverage: ["ai_infrastructure", "ai_software", "ai_adoption"]
    known_estimates:
      - year: 2023
        as_published_usd_billions: 207.0
        publication_year: 2024
      - year: 2026
        as_published_usd_billions: 632.0
        publication_year: 2024  # IDC forecast figure — verify during 08-02

  - firm: "Gartner"
    report_series: "Worldwide AI Spending Forecast"
    scope_alignment: "broad"
    scope_coefficient: 0.18
    scope_coefficient_range: [0.15, 0.22]
    includes: "All AI-adjacent technology spending including general IT infrastructure, AI hardware, software, services, and AI-enabled devices"
    excludes: "Nothing explicitly excluded — broadest published definition"
    segment_coverage: ["ai_hardware", "ai_infrastructure", "ai_software", "ai_adoption"]
    known_estimates:
      - year: 2025
        as_published_usd_billions: 1500.0
        publication_year: 2025  # Verify exact figure during 08-02
      - year: 2030
        as_published_usd_billions: 5900.0
        publication_year: 2025  # Gartner 2030 forecast — verify during 08-02

  - firm: "Grand View Research"
    report_series: "Artificial Intelligence Market Size Report"
    scope_alignment: "partial"
    scope_coefficient: 1.15
    scope_coefficient_range: [1.05, 1.25]
    includes: "AI software platforms, machine learning, natural language processing, computer vision — narrow software focus"
    excludes: "AI-specific hardware (GPUs, TPUs), cloud infrastructure CapEx dedicated to AI — narrower than our scope"
    segment_coverage: ["ai_software", "ai_adoption"]
    known_estimates:
      - year: 2023
        as_published_usd_billions: 196.6
        publication_year: 2024
      - year: 2030
        as_published_usd_billions: 826.7
        publication_year: 2024  # Grand View forecast — verify during 08-02

  - firm: "Statista"
    report_series: "Artificial Intelligence Market Outlook"
    scope_alignment: "partial"
