  - cik: "0001018724"
    company_name: "Amazon.com Inc."
    primary_layer: "cloud"
    sub_segment_splits:
      ai_infrastructure: 0.90
      ai_software: 0.10
    rationale: "AWS AI/ML ~90% infrastructure (GPU instances, SageMaker compute), ~10% Bedrock and managed AI software services"
