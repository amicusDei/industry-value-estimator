    vintage_date: "2025-07"

  - cik: "0001652044"
    company_name: "Alphabet Inc."
    primary_layer: "cloud"
    sub_segment_splits:
      ai_infrastructure: 0.90
      ai_software: 0.10
    rationale: "Google Cloud AI ~90% infrastructure (TPU, Vertex AI compute), ~10% AI software APIs and platform tools"
